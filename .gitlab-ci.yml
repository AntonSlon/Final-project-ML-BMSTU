stages:
  - quality

default:
  image: python:3.11-slim

variables:
  PYTHONDONTWRITEBYTECODE: "1"

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_PIPELINE_SOURCE == "web"'

python_syntax:
  stage: quality
  script:
    - python -m compileall -q main.py src dags
